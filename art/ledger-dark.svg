<svg width="600" height="180" viewBox="0 0 600 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="180" fill="none"/>

  <!-- Ledger mark: a balanced double-entry scale built from two columns -->
  <g transform="translate(48, 40)">
    <!-- center beam -->
    <rect x="46" y="0" width="8" height="100" rx="2" fill="#E2E8F0"/>
    <!-- top crossbar -->
    <rect x="6" y="14" width="88" height="8" rx="4" fill="#E2E8F0"/>
    <!-- left pan (debit) -->
    <path d="M6 18 L-14 50 L26 50 Z" fill="#60A5FA"/>
    <line x1="10" y1="18" x2="-14" y2="50" stroke="#E2E8F0" stroke-width="3" stroke-linecap="round"/>
    <line x1="10" y1="18" x2="26" y2="50" stroke="#E2E8F0" stroke-width="3" stroke-linecap="round"/>
    <!-- right pan (credit) -->
    <path d="M94 18 L74 50 L114 50 Z" fill="#34D399"/>
    <line x1="90" y1="18" x2="74" y2="50" stroke="#E2E8F0" stroke-width="3" stroke-linecap="round"/>
    <line x1="90" y1="18" x2="114" y2="50" stroke="#E2E8F0" stroke-width="3" stroke-linecap="round"/>
    <!-- base -->
    <rect x="22" y="98" width="56" height="8" rx="4" fill="#E2E8F0"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(200, 0)">
    <text x="0" y="92" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="48" font-weight="800" fill="#F8FAFC" letter-spacing="-1">Laravel Ledger</text>
    <text x="2" y="124" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="17" font-weight="500" fill="#94A3B8" letter-spacing="0.5">immutable · append-only · double-entry</text>
  </g>
</svg>
